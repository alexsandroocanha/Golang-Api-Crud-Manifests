apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-down-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: pod-alerts
      rules:
        - alert: PodCaiu
          expr: kube_pod_status_phase{phase=~"Failed|Unknown"} == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} caiu"
            description: "O pod {{ $labels.pod }} no namespace {{ $labels.namespace }} está no estado {{ $labels.phase }} há mais de 1 minuto."

        - alert: PodReiniciando
          expr: increase(kube_pod_container_status_restarts_total[5m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} reiniciou"
            description: "O container {{ $labels.container }} do pod {{ $labels.pod }} reiniciou nos últimos 5 minutos."