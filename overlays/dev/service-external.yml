apiVersion: v1
kind: Service
metadata:
  name: golang-api-crud-external
spec:
  type: NodePort
  selector:
    app: golang-api-crud
  ports:
    - name: http
      port: 8081
      targetPort: http
      nodePort: 30081
      protocol: TCP