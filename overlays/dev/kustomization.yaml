apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: golang-api-crud-dev

resources:
- ../../base
- namespace.yml
- service-external.yml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: golang-api-crud
images:
- name: ghcr.io/alexsandroocanha/golang-api-crud
  newTag: bb6441d5c4cba7565b7c6fbe3fa1c201f29d4d8e
